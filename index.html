<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>斯特鲁普效应 · 专业版 v3</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js">
</script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js">
</script>
<style>
  :root {
    --red:#e74c3c; --blue:#3498db; --green:#2ecc71; --yellow:#f1c40f;
    --bg:#0d0d1a; --card:#151530; --text:#eee; --sub:#aaa;
    --accent:#667eea; --glow:#667eea;
    --combo-glow:0 0 30px rgba(102,126,234,.6);
  }
  /* 困难模式色调微调 */
  body.diff-hard { --bg:#0f0f1f; --card:#181838; --accent:#e67e22; --glow:#e67e22; }

  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;
    display:flex;justify-content:center;align-items:center;
    padding:14px;user-select:none;-webkit-user-select:none;overflow-x:hidden;
    transition:background .4s;
  }
  .container{width:100%;max-width:820px;text-align:center}
  .hidden{display:none!important}

  /* ========== 呼吸灯 ========== */
  @keyframes breathe{
    0%,100%{box-shadow:0 0 0 rgba(46,204,113,0)}
    50%{box-shadow:0 0 60px rgba(46,204,113,.4),inset 0 0 60px rgba(46,204,113,.05)}
  }
  .breathe{animation:breathe .8s ease 2}

  /* ========== 震动 ========== */
  @keyframes shake{
    0%,100%{transform:translateX(0)}
    15%{transform:translateX(-14px)translateY(3px)}
    30%{transform:translateX(14px)translateY(-3px)}
    45%{transform:translateX(-10px)translateY(-2px)}
    60%{transform:translateX(10px)translateY(2px)}
    75%{transform:translateX(-5px)}
  }
  .shake{animation:shake .45s ease}

  /* ========== 卡片 ========== */
  .card{
    background:var(--card);border-radius:24px;
    padding:36px 32px;box-shadow:0 8px 40px rgba(0,0,0,.4);
    position:relative;transition:background .4s;
  }

  /* ========== 全局闪光 ========== */
  .flash-overlay{
    position:fixed;inset:0;pointer-events:none;z-index:999;
    opacity:0;transition:opacity .15s;
  }
  .flash-overlay.correct{background:rgba(46,204,113,.25);opacity:1}
  .flash-overlay.wrong{background:rgba(231,76,60,.35);opacity:1}

  /* ========== 按钮通用 ========== */
  .btn{
    display:inline-block;padding:14px 34px;border:none;
    border-radius:12px;font-size:1.05rem;font-weight:700;
    cursor:pointer;transition:transform .12s,box-shadow .15s;letter-spacing:.04em;
  }
  .btn:active{transform:scale(.95)}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{box-shadow:0 4px 18px rgba(102,126,234,.5)}
  .btn-danger{background:#e74c3c;color:#fff}
  .btn-outline{background:transparent;border:2px solid var(--accent);color:var(--accent)}

  /* ========== 大厅 ========== */
  .setup-title{font-size:1.7rem;margin-bottom:4px}
  .setup-sub{color:var(--sub);font-size:.9rem;margin-bottom:24px}

  .mode-select{
    display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-bottom:28px;
  }
  .mode-option{
    padding:24px 22px;border-radius:18px;
    border:3px solid rgba(255,255,255,.1);background:#1e1e40;
    color:#ccc;cursor:pointer;transition:all .18s;
    text-align:center;min-width:170px;
  }
  .mode-option:hover{border-color:var(--accent);background:#252550}
  .mode-option.selected{border-color:var(--accent);background:#2a2a5a;color:#fff;box-shadow:0 0 24px rgba(102,126,234,.3)}
  .mode-option .mode-icon{font-size:2.2rem;display:block;margin-bottom:8px}
  .mode-option .mode-title{font-size:1.1rem;font-weight:700}

  .setup-section{margin-bottom:28px}
  .group-select,.timer-select,.qcount-select,.diff-select{
    display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:8px;
  }
  .group-option{
    width:90px;height:90px;border-radius:18px;
    border:3px solid rgba(255,255,255,.1);background:#1e1e40;
    color:#ccc;font-size:1.1rem;font-weight:700;
    cursor:pointer;transition:all .18s;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  }
  .group-option:hover{border-color:var(--accent);background:#252550}
  .group-option.selected{border-color:var(--accent);background:#2a2a5a;color:#fff;box-shadow:0 0 20px rgba(102,126,234,.3)}
  .group-option .icon{font-size:1.8rem}

  .time-option,.qcount-option,.diff-option{
    padding:12px 22px;border-radius:12px;
    border:3px solid rgba(255,255,255,.1);background:#1e1e40;
    color:#ccc;font-size:1.05rem;font-weight:700;
    cursor:pointer;transition:all .18s;
  }
  .time-option:hover,.qcount-option:hover,.diff-option:hover{border-color:var(--accent)}
  .time-option.selected,.qcount-option.selected,.diff-option.selected{
    border-color:var(--accent);background:#2a2a5a;color:#fff
  }
  .setup-btns{display:flex;gap:14px;justify-content:center}

  /* ========== 游戏页顶部 ========== */
  .top-bar{
    display:flex;align-items:center;justify-content:center;margin-bottom:12px;
  }
  .timer{
    font-size:clamp(3rem,8vw,5rem);font-weight:900;
    font-variant-numeric:tabular-nums;line-height:1;
  }
  .timer.warning{color:#e74c3c;animation:pulse .6s ease infinite alternate}
  @keyframes pulse{to{opacity:.4}}

  .pause-btn{
    position:fixed;bottom:22px;left:22px;z-index:500;
    width:52px;height:52px;border-radius:50%;
    border:2px solid rgba(255,255,255,.12);background:rgba(0,0,0,.5);
    color:#777;font-size:1.1rem;cursor:pointer;
    transition:all .15s;backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;
  }
  .pause-btn:hover{border-color:#fff;color:#fff;background:rgba(0,0,0,.7)}

  /* ========== 队伍/进度/任务/Combo ========== */
  .team-indicator{font-size:1.4rem;font-weight:800;margin-bottom:8px}
  .solo-progress{font-size:1.15rem;font-weight:700;color:var(--sub);margin-bottom:8px}

  .task-badge{
    display:inline-block;padding:10px 28px;border-radius:14px;
    font-size:1.3rem;font-weight:900;letter-spacing:.06em;margin-bottom:12px;
  }
  .task-badge.color-task{background:rgba(52,152,219,.2);color:#3498db;border:2px solid rgba(52,152,219,.35)}
  .task-badge.meaning-task{background:rgba(230,126,34,.2);color:#e67e22;border:2px solid rgba(230,126,34,.35)}

  .combo-display{
    font-size:1.1rem;font-weight:700;margin-bottom:8px;min-height:1.5em;
    transition:all .3s;
  }
  .combo-display.fire{color:#f1c40f;text-shadow:0 0 20px rgba(241,196,15,.6)}
  .combo-display.ultra{color:#e74c3c;text-shadow:0 0 30px rgba(231,76,60,.7);font-size:1.4rem}

  /* ========== 刺激词 ========== */
  #stimulus{
    font-size:clamp(5rem,16vw,9rem);font-weight:900;
    letter-spacing:.06em;margin:16px 0 28px;
    line-height:1.15;min-height:1.2em;transition:text-shadow .25s;
  }
  #stimulus.combo-glow{text-shadow:0 0 40px var(--glow),0 0 80px var(--glow)}

  /* ========== 颜色按钮 ========== */
  .color-grid{
    display:grid;grid-template-columns:1fr 1fr;
    gap:20px;width:100%;max-width:560px;margin:0 auto;
  }
  .color-btn{
    padding:32px 20px;border:3px solid rgba(255,255,255,.1);
    border-radius:20px;font-size:1.8rem;font-weight:800;
    cursor:pointer;background:#1e1e40;color:#ddd;
    text-align:center;letter-spacing:.08em;
    transition:transform .1s,background .15s,border-color .15s;
    min-height:90px;display:flex;align-items:center;justify-content:center;
  }
  .color-btn:hover{border-color:rgba(255,255,255,.35);background:#282850}
  .color-btn:active{transform:scale(.95)}
  .color-btn.locked{pointer-events:none;opacity:.5}

  /* ========== 反馈大字 ========== */
  .big-feedback{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%)scale(0);
    font-size:8rem;font-weight:900;pointer-events:none;z-index:1000;
    transition:transform .15s cubic-bezier(.175,.885,.32,1.275);
  }
  .big-feedback.show{transform:translate(-50%,-50%)scale(1)}
  .big-feedback.correct{color:#2ecc71;text-shadow:0 0 60px rgba(46,204,113,.7)}
  .big-feedback.wrong{color:#e74c3c;text-shadow:0 0 60px rgba(231,76,60,.7)}

  /* ========== 计分板 ========== */
  .scoreboard{
    display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:20px;
  }
  .score-item{
    background:#1e1e40;border-radius:14px;padding:14px 20px;
    border:3px solid rgba(255,255,255,.08);min-width:70px;
    transition:border-color .25s,box-shadow .25s,background .25s;
  }
  .score-item.active{border-color:var(--accent);box-shadow:0 0 18px rgba(102,126,234,.4);background:#252550}
  .score-item .team-name{font-size:.8rem;color:var(--sub);margin-bottom:4px}
  .score-item .team-score{font-size:1.8rem;font-weight:900}

  /* ========== 暂停 ========== */
  .pause-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:2000;
    display:flex;align-items:center;justify-content:center;
  }
  .pause-card{
    background:var(--card);border-radius:24px;
    padding:38px 44px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.6);
  }
  .pause-card h2{font-size:1.7rem;margin-bottom:14px}
  .pause-card .btn{margin:6px;min-width:110px}

  /* ========== 分组结算 ========== */
  .ranking-title{font-size:2rem;margin-bottom:8px}
  .rank-list{text-align:left}
  .rank-row{
    display:flex;align-items:center;gap:14px;
    padding:16px 18px;border-radius:14px;margin-bottom:8px;
    background:#1e1e40;border:2px solid rgba(255,255,255,.05);
  }
  .rank-row:nth-child(1){border-color:#f1c40f;background:#2a2810}
  .rank-row:nth-child(2){border-color:#aaa}
  .rank-row:nth-child(3){border-color:#cd7f32}
  .rank-num{font-size:1.8rem;font-weight:900;min-width:44px;text-align:center}
  .rank-name{flex:1;font-size:1.1rem;font-weight:700}
  .rank-score{font-size:1.4rem;font-weight:900;color:var(--accent)}

  /* ========== 单人报告 ========== */
  .report-title{font-size:1.7rem;margin-bottom:4px}
  .report-sub{color:var(--sub);font-size:.9rem;margin-bottom:20px}

  .stat-cards{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:14px;margin-bottom:20px;
  }
  .stat-card{
    background:#1e1e40;border-radius:14px;padding:18px 14px;
    border:2px solid rgba(255,255,255,.07);text-align:center;
  }
  .stat-card .sv{font-size:2.2rem;font-weight:900;line-height:1.2}
  .stat-card .sl{font-size:.78rem;color:var(--sub);margin-top:3px}

  .hl-card{
    background:rgba(102,126,234,.08);border:2px solid rgba(102,126,234,.2);
    border-radius:14px;padding:18px 22px;margin-bottom:18px;text-align:center;
  }
  .hl-card .hv{font-size:2.4rem;font-weight:900;color:var(--accent)}
  .hl-card .hl{font-size:.82rem;color:var(--sub);margin:4px 0 10px}

  .comment-box{
    background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
    border-radius:14px;padding:18px 22px;margin-bottom:18px;text-align:left;
  }
  .comment-box .ci{font-size:1.5rem;display:block;margin-bottom:4px}
  .comment-box .ct{font-size:.95rem;font-weight:700;margin-bottom:4px}
  .comment-box .cb{font-size:.85rem;color:var(--sub);line-height:1.6}

  .chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
  .chart-box{
    background:#1e1e40;border-radius:14px;padding:14px;
    border:1px solid rgba(255,255,255,.05);
  }
  .chart-box .chart-title{font-size:.8rem;color:var(--sub);margin-bottom:8px}
  .chart-box canvas{width:100%!important;max-height:220px}

  .report-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:4px}

  /* ========== 响应式 ========== */
  @media(max-width:600px){
    .card{padding:20px 12px}
    .color-btn{padding:22px 10px;font-size:1.2rem;min-height:66px}
    .color-grid{gap:10px}
    .stat-cards{grid-template-columns:1fr 1fr}
    .stat-card .sv{font-size:1.6rem}
    .chart-row{grid-template-columns:1fr}
    .big-feedback{font-size:5rem}
    .task-badge{font-size:1.1rem;padding:8px 20px}
    .mode-option{min-width:130px;padding:18px 14px}
  }
</style>
</head>
<body>

<div class="flash-overlay" id="flash"></div>
<div class="big-feedback" id="big-fb"></div>

<!-- 暂停遮罩 -->
<div class="pause-overlay hidden" id="pause-overlay">
  <div class="pause-card">
    <h2>⏸ 游戏暂停</h2>
    <p style="color:var(--sub);margin-bottom:18px" id="pause-hint"></p>
    <button class="btn btn-primary" onclick="resumeGame()">继续游戏</button>
    <button class="btn" style="background:#e67e22;color:#fff" onclick="restartRound()">重新开始本轮</button>
    <button class="btn btn-danger" onclick="abortGame()">结束游戏</button>
  </div>
</div>

<div class="container">

  <!-- ==================== 大厅 ==================== -->
  <div id="screen-setup" class="card">
    <h1 class="setup-title">🧠 斯特鲁普效应 · 专业版</h1>
    <p class="setup-sub">Stroop Effect v3 · 双模式 · 难度分级 · 数据报告</p>

    <div class="mode-select" id="mode-select">
      <div class="mode-option selected" data-mode="group">
        <span class="mode-icon">👥</span><span class="mode-title">班级车轮战 (多人)</span>
      </div>
      <div class="mode-option" data-mode="solo">
        <span class="mode-icon">🧑</span><span class="mode-title">专注力实验 (单人)</span>
      </div>
    </div>

    <!-- 分组设置 -->
    <div class="setup-section" id="section-group">
      <p style="font-size:1rem;font-weight:700;margin-bottom:12px">选择队伍数量</p>
      <div class="group-select" id="group-select">
        <div class="group-option selected" data-groups="2"><span class="icon">🔴🔵</span>2 组</div>
        <div class="group-option" data-groups="3"><span class="icon">🔴🔵🟢</span>3 组</div>
        <div class="group-option" data-groups="4"><span class="icon">🔴🔵🟢🟡</span>4 组</div>
      </div>
      <p style="font-size:1rem;font-weight:700;margin:16px 0 12px">倒计时时长</p>
      <div class="timer-select" id="timer-select">
        <div class="time-option" data-seconds="30">30 秒</div>
        <div class="time-option selected" data-seconds="60">60 秒</div>
        <div class="time-option" data-seconds="90">90 秒</div>
        <div class="time-option" data-seconds="120">120 秒</div>
      </div>
    </div>

    <!-- 单人设置 -->
    <div class="setup-section hidden" id="section-solo">
      <p style="font-size:1rem;font-weight:700;margin-bottom:12px">题目数量</p>
      <div class="qcount-select" id="qcount-select">
        <div class="qcount-option selected" data-questions="20">20 题</div>
        <div class="qcount-option" data-questions="30">30 题</div>
        <div class="qcount-option" data-questions="50">50 题</div>
      </div>
      <p style="font-size:1rem;font-weight:700;margin:16px 0 12px">挑战难度</p>
      <div class="diff-select" id="diff-select">
        <div class="diff-option selected" data-diff="normal">普通 · 传统 Stroop</div>
        <div class="diff-option" data-diff="hard">困难 · 混合反向 Stroop</div>
      </div>
    </div>

    <div class="setup-btns">
      <button class="btn btn-primary" onclick="startGame()" style="font-size:1.15rem;padding:16px 44px">确认开始</button>
      <button class="btn" style="background:#333;color:#aaa" onclick="resetSetup()">重置</button>
    </div>
  </div>

  <!-- ==================== 游戏页 ==================== -->
  <div id="screen-game" class="card hidden">
    <div class="top-bar"><div class="timer" id="timer">60</div></div>
    <div class="team-indicator" id="team-indicator">🔴 第 1 组 答题</div>
    <div class="solo-progress hidden" id="solo-progress">第 1 / 30 题</div>
    <div class="task-badge hidden" id="task-badge"></div>
    <div class="combo-display" id="combo-display"></div>
    <div id="stimulus"></div>
    <div id="color-buttons" class="color-grid"></div>
    <div class="scoreboard" id="scoreboard"></div>
    <button class="pause-btn" onclick="pauseGame()">⏸</button>
  </div>

  <!-- ==================== 分组结算 ==================== -->
  <div id="screen-results" class="card hidden">
    <h2 class="ranking-title">🏆 最终排名</h2>
    <p style="color:var(--sub);margin-bottom:22px" id="ranking-sub"></p>
    <div class="rank-list" id="rank-list"></div>
    <button class="btn btn-primary" style="margin-top:24px" onclick="backToSetup()">返回大厅</button>
  </div>

  <!-- ==================== 单人报告 ==================== -->
  <div id="screen-report" class="card hidden" style="text-align:left;max-width:780px">
    <h2 class="report-title" style="text-align:center">📊 个人专注力测试报告</h2>
    <p class="report-sub" style="text-align:center" id="report-sub"></p>
    <div class="stat-cards" id="stat-cards"></div>
    <div class="hl-card" id="hl-card"></div>
    <div class="comment-box" id="comment-box"></div>
    <div class="chart-row">
      <div class="chart-box"><div class="chart-title">📊 分类反应时间对比</div><canvas id="chart-bar"></canvas></div>
      <div class="chart-box"><div class="chart-title">📈 注意力波动曲线</div><canvas id="chart-line"></canvas></div>
    </div>
    <div class="report-btns">
      <button class="btn btn-primary" onclick="startSoloReplay()">🔄 再挑战一次</button>
      <button class="btn btn-outline" onclick="saveReport()">💾 保存数据报告</button>
      <button class="btn" style="background:#333;color:#aaa" onclick="backToSetup()">🏠 返回主界面</button>
    </div>
  </div>

</div>

<script>
// ==================== 常量 ====================
const COLS=['red','blue','green','yellow'];
const CHEX={red:'#e74c3c',blue:'#3498db',green:'#2ecc71',yellow:'#f1c40f'};
const CNAME={red:'红色',blue:'蓝色',green:'绿色',yellow:'黄色'};
const TDOTS=['🔴','🔵','🟢','🟡'];
const TCOLS=['#e74c3c','#3498db','#2ecc71','#f1c40f'];
const CD_MS=450;

// ==================== 音效 (Web Audio API) ====================
let ac=null;
function ctx(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac}
function beep(f,t,d,v=.1,dl=0){
  try{const c=ctx(),o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime+dl);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+dl+d);o.connect(g);g.connect(c.destination);o.start(c.currentTime+dl);o.stop(c.currentTime+dl+d)}catch(e){}
}
function sfxCorrect(){beep(880,'sine',.12,.1);setTimeout(()=>beep(1100,'sine',.1,.09),100)}
function sfxWrong(){beep(100,'square',.22,.1)}
function sfxCombo(n){beep(600+n*60,'triangle',.1,.08);setTimeout(()=>beep(800+n*80,'triangle',.12,.1),80)}
function sfxEnd(){[440,554,660,880].forEach((f,i)=>setTimeout(()=>beep(f,'triangle',.25,.12),i*120))}

// ==================== 状态 ====================
let gameMode='group',gameActive=false,paused=false,cooldown=false;
// 分组
let numTeams=2,totalSec=60,teams=[],curTeam=0,timeLeft=0,timerH=null;
// 单人
let soloQCount=20,soloDiff='normal',soloData=[],soloIdx=0,combo=0,maxCombo=0;
// 试次
let trials=[],tIdx=0,tStart=0,curTask='color'; // curTask: 'color'|'meaning'

// ==================== 大厅逻辑 ====================
document.getElementById('mode-select').addEventListener('click',e=>{
  const o=e.target.closest('.mode-option');if(!o)return;
  document.querySelectorAll('.mode-option').forEach(x=>x.classList.remove('selected'));
  o.classList.add('selected');gameMode=o.dataset.mode;
  document.getElementById('section-group').classList.toggle('hidden',gameMode==='solo');
  document.getElementById('section-solo').classList.toggle('hidden',gameMode==='group');
});
['group-select','timer-select','qcount-select','diff-select'].forEach(id=>{
  document.getElementById(id).addEventListener('click',e=>{
    const o=e.target.closest('[data-groups],[data-seconds],[data-questions],[data-diff]');
    if(!o)return;
    document.querySelectorAll('#'+id+' > *').forEach(x=>x.classList.remove('selected'));
    o.classList.add('selected');
    if(o.dataset.groups)numTeams=parseInt(o.dataset.groups);
    if(o.dataset.seconds)totalSec=parseInt(o.dataset.seconds);
    if(o.dataset.questions)soloQCount=parseInt(o.dataset.questions);
    if(o.dataset.diff)soloDiff=o.dataset.diff;
  });
});
function resetSetup(){
  document.querySelectorAll('.mode-option').forEach(o=>o.classList.toggle('selected',o.dataset.mode==='group'));
  gameMode='group';document.getElementById('section-group').classList.remove('hidden');
  document.getElementById('section-solo').classList.add('hidden');
  document.querySelectorAll('#group-select>*').forEach(o=>o.classList.toggle('selected',o.dataset.groups=='2'));
  numTeams=2;
  document.querySelectorAll('#timer-select>*').forEach(o=>o.classList.toggle('selected',o.dataset.seconds=='60'));
  totalSec=60;
  document.querySelectorAll('#qcount-select>*').forEach(o=>o.classList.toggle('selected',o.dataset.questions=='20'));
  soloQCount=20;
  document.querySelectorAll('#diff-select>*').forEach(o=>o.classList.toggle('selected',o.dataset.diff==='normal'));
  soloDiff='normal';
}
function showScreen(id){
  ['screen-setup','screen-game','screen-results','screen-report'].forEach(s=>document.getElementById(s).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ==================== 生成试次 ====================
function generateTrials(n){
  const list=[];
  const total=(gameMode==='group')?Math.ceil(n/numTeams)*numTeams:n;
  const half=Math.floor(total/2);
  for(let i=0;i<half;i++){
    const w=COLS[Math.floor(Math.random()*COLS.length)];
    list.push({word:w,color:w,congruent:true});
  }
  for(let i=0;i<half;i++){
    const w=COLS[Math.floor(Math.random()*COLS.length)];
    const others=COLS.filter(c=>c!==w);
    list.push({word:w,color:others[Math.floor(Math.random()*others.length)],congruent:false});
  }
  // Fisher-Yates
  for(let i=list.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[list[i],list[j]]=[list[j],list[i]]}
  return list;
}

// ==================== 开始游戏 ====================
function startGame(){
  gameActive=true;cooldown=false;paused=false;tIdx=0;
  document.body.classList.toggle('diff-hard',gameMode==='solo'&&soloDiff==='hard');
  combo=0;maxCombo=0;

  if(gameMode==='group'){
    teams=[];for(let i=0;i<numTeams;i++)teams.push({name:`第 ${i+1} 组`,score:0});
    curTeam=0;timeLeft=totalSec;
    trials=generateTrials(Math.max(totalSec*2,60));
    document.getElementById('team-indicator').classList.remove('hidden');
    document.getElementById('solo-progress').classList.add('hidden');
    document.getElementById('task-badge').classList.add('hidden');
    document.getElementById('combo-display').classList.add('hidden');
    document.getElementById('scoreboard').classList.remove('hidden');
    document.getElementById('timer').classList.remove('hidden');
    showScreen('screen-game');
    renderSB();updateTimer();updateTI();showTrial();
    timerH=setInterval(()=>{if(paused)return;timeLeft--;updateTimer();if(timeLeft<=0)endGame()},1000);
  }else{
    soloData=[];soloIdx=0;
    trials=generateTrials(soloQCount);
    document.getElementById('team-indicator').classList.add('hidden');
    document.getElementById('solo-progress').classList.remove('hidden');
    document.getElementById('task-badge').classList.toggle('hidden',soloDiff==='normal');
    document.getElementById('combo-display').classList.remove('hidden');
    document.getElementById('scoreboard').classList.add('hidden');
    document.getElementById('timer').classList.add('hidden');
    document.getElementById('combo-display').textContent='';
    document.getElementById('combo-display').className='combo-display';
    showScreen('screen-game');
    updateSoloP();showTrial();
  }
}

// ==================== 当前任务类型 ====================
function getTaskForTrial(){
  if(soloDiff==='normal')return 'color'; // 普通模式：始终看颜色
  // 困难模式：随机 50% Stroop / 50% 反向
  return Math.random()<0.5?'color':'meaning';
}

// ==================== 显示试次 ====================
function showTrial(){
  if(tIdx>=trials.length){
    if(gameMode==='group'){trials=generateTrials(Math.max(timeLeft*2+10,20));tIdx=0}
    else{endGame();return}
  }
  const t=trials[tIdx];
  const el=document.getElementById('stimulus');
  el.textContent=CNAME[t.word];
  el.style.color=CHEX[t.color];

  // 单人：决定任务类型
  if(gameMode==='solo'){
    curTask=getTaskForTrial();
    if(soloDiff==='hard'){
      const badge=document.getElementById('task-badge');
      if(curTask==='color'){
        badge.textContent='👁 看颜色';
        badge.className='task-badge color-task';
      }else{
        badge.textContent='📖 看字义';
        badge.className='task-badge meaning-task';
      }
      badge.classList.remove('hidden');
    }
  }

  renderBtns();
  cooldown=false;
  document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('locked'));
  updateComboUI();
  tStart=performance.now();
}

function renderBtns(){
  const container=document.getElementById('color-buttons');
  const shuf=[...COLS].sort(()=>Math.random()-.5);
  container.innerHTML=shuf.map(c=>`<button class="color-btn" onclick="answer('${c}')">${CNAME[c]}</button>`).join('');
}

// ==================== 答题 ====================
function answer(userColor){
  if(!gameActive||cooldown||paused)return;
  cooldown=true;
  document.querySelectorAll('.color-btn').forEach(b=>b.classList.add('locked'));

  const rt=performance.now()-tStart;
  const trial=trials[tIdx];
  let correct;

  // 判定正误
  if(gameMode==='solo'&&curTask==='meaning'){
    // 反向 Stroop：看字义，正确答案 = 文字含义的颜色
    correct=(userColor===trial.word);
  }else{
    // 传统 Stroop：看字体颜色
    correct=(userColor===trial.color);
  }

  // ---- 单人数据记录 ----
  if(gameMode==='solo'){
    soloData.push({
      task:curTask,word:trial.word,color:trial.color,
      congruent:trial.congruent,answer:userColor,correct,rt
    });
    soloIdx++;
    // Combo
    if(correct){combo++;if(combo>maxCombo)maxCombo=combo}
    else combo=0;
  }

  // ---- 分组加分 ----
  if(gameMode==='group'){
    if(correct){teams[curTeam].score++;renderSB()}
    curTeam=(curTeam+1)%numTeams;updateTI();
  }

  // 反馈
  if(correct){
    flashScreen('correct');
    document.body.classList.add('breathe');
    setTimeout(()=>document.body.classList.remove('breathe'),1600);
    showBigFB('✓','correct');
    sfxCorrect();
    if(combo>=5)sfxCombo(Math.min(combo,15));
  }else{
    flashScreen('wrong');
    document.body.classList.add('shake');
    setTimeout(()=>document.body.classList.remove('shake'),450);
    showBigFB('✗','wrong');
    sfxWrong();
  }

  tIdx++;

  setTimeout(()=>{
    if(!gameActive||paused)return;
    if(gameMode==='solo'){updateSoloP();if(soloIdx>=soloQCount){endGame();return}}
    showTrial();
  },CD_MS);
}

// ==================== Combo UI ====================
function updateComboUI(){
  if(gameMode!=='solo')return;
  const el=document.getElementById('combo-display');
  const stim=document.getElementById('stimulus');
  stim.classList.remove('combo-glow');

  if(combo>=15){el.textContent=`🔥 ${combo} 连击！超凡入圣！`;el.className='combo-display ultra';stim.classList.add('combo-glow')}
  else if(combo>=10){el.textContent=`⚡ ${combo} 连击！势不可挡！`;el.className='combo-display fire';stim.classList.add('combo-glow')}
  else if(combo>=5){el.textContent=`✨ ${combo} 连击！`;el.className='combo-display fire'}
  else{el.textContent='';el.className='combo-display'}
}

// ==================== 视觉 ====================
function flashScreen(t){
  const el=document.getElementById('flash');el.classList.add(t);
  setTimeout(()=>el.classList.remove(t),350);
}
function showBigFB(s,t){
  const el=document.getElementById('big-fb');el.textContent=s;
  el.className='big-feedback '+t+' show';
  setTimeout(()=>{el.className='big-feedback '+t},300);
}

// ==================== UI ====================
function updateTimer(){
  const el=document.getElementById('timer');el.textContent=timeLeft;
  el.classList.toggle('warning',timeLeft<=10);
}
function updateTI(){
  document.getElementById('team-indicator').innerHTML=
    `${TDOTS[curTeam]} <span style="color:${TCOLS[curTeam]}">${teams[curTeam].name}</span> 答题`;
  renderSB();
}
function updateSoloP(){
  document.getElementById('solo-progress').textContent=`当前进度：${soloIdx} / ${soloQCount} 题`;
}
function renderSB(){
  document.getElementById('scoreboard').innerHTML=teams.map((t,i)=>`
    <div class="score-item${i===curTeam?' active':''}">
      <div class="team-name">${TDOTS[i]} ${t.name}</div>
      <div class="team-score" style="color:${TCOLS[i]}">${t.score}</div>
    </div>`).join('');
}

// ==================== 暂停 ====================
function pauseGame(){if(!gameActive)return;paused=true;document.getElementById('pause-overlay').classList.remove('hidden')}
function resumeGame(){paused=false;document.getElementById('pause-overlay').classList.add('hidden')}
function abortGame(){clearInterval(timerH);gameActive=false;paused=false;cooldown=false;document.getElementById('pause-overlay').classList.add('hidden');backToSetup()}
function restartRound(){
  if(gameMode==='group'){
    for(let i=0;i<numTeams;i++)teams[i].score=0;curTeam=0;timeLeft=totalSec;tIdx=0;
    trials=generateTrials(Math.max(totalSec*2,60));
  }else{soloData=[];soloIdx=0;tIdx=0;combo=0;maxCombo=0;trials=generateTrials(soloQCount)}
  paused=false;cooldown=false;gameActive=true;
  document.getElementById('pause-overlay').classList.add('hidden');
  if(gameMode==='group'){renderSB();updateTimer();updateTI();
    timerH=setInterval(()=>{if(paused)return;timeLeft--;updateTimer();if(timeLeft<=0)endGame()},1000)}
  else updateSoloP();
  showTrial();
}

// ==================== 键盘 ====================
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'||e.key==='p'||e.key==='P'){
    if(paused)resumeGame();else if(gameActive)pauseGame();
  }
});

// ==================== 结束游戏 ====================
function endGame(){
  clearInterval(timerH);gameActive=false;cooldown=true;sfxEnd();
  if(gameMode==='group'){
    const ranked=[...teams].sort((a,b)=>b.score-a.score);
    document.getElementById('ranking-sub').textContent=`共 ${numTeams} 组 · ${totalSec} 秒倒计时`;
    document.getElementById('rank-list').innerHTML=ranked.map((t,i)=>`
      <div class="rank-row">
        <div class="rank-num">${['🥇','🥈','🥉','🏅'][i]||''}</div>
        <div class="rank-name"><span style="color:${TCOLS[teams.indexOf(t)]}">${TDOTS[teams.indexOf(t)]}</span> ${t.name}</div>
        <div class="rank-score">${t.score} 分</div>
      </div>`).join('');
    showScreen('screen-results');
  }else{showSoloReport()}
}

// ==================== 单人报告 ====================
function showSoloReport(){
  const d=soloData,total=d.length;
  const correct=d.filter(x=>x.correct).length,wrong=total-correct;
  const acc=total>0?(correct/total*100):0;
  const avgRT=total>0?d.reduce((s,x)=>s+x.rt,0)/total:0;

  // 按条件分组
  const cong=d.filter(x=>x.congruent&&x.correct);
  const incong=d.filter(x=>!x.congruent&&x.correct);
  const colorTask=d.filter(x=>x.task==='color'&&x.correct);
  const meaningTask=d.filter(x=>x.task==='meaning'&&x.correct);

  const avgCong=cong.length>0?cong.reduce((s,x)=>s+x.rt,0)/cong.length:0;
  const avgInc=incong.length>0?incong.reduce((s,x)=>s+x.rt,0)/incong.length:0;
  const avgColor=colorTask.length>0?colorTask.reduce((s,x)=>s+x.rt,0)/colorTask.length:0;
  const avgMeaning=meaningTask.length>0?meaningTask.reduce((s,x)=>s+x.rt,0)/meaningTask.length:0;

  const stroopDelay=avgInc-avgCong;
  const switchCost=avgMeaning-avgColor; // 切换代价

  document.getElementById('report-sub').textContent=`${total} 题 · ${correct} 对 ${wrong} 错 · 难度：${soloDiff==='normal'?'普通':'困难'}`;

  // 数据卡片
  document.getElementById('stat-cards').innerHTML=`
    <div class="stat-card"><div class="sv" style="color:#667eea">${acc.toFixed(1)}%</div><div class="sl">整体正确率</div></div>
    <div class="stat-card"><div class="sv" style="color:#f1c40f">${avgRT.toFixed(0)} ms</div><div class="sl">平均反应时间</div></div>
    <div class="stat-card"><div class="sv" style="color:#2ecc71">${avgCong.toFixed(0)} ms</div><div class="sl">一致题平均 RT</div></div>
    <div class="stat-card"><div class="sv" style="color:#e74c3c">${avgInc.toFixed(0)} ms</div><div class="sl">冲突题平均 RT</div></div>
    ${soloDiff==='hard'?`
      <div class="stat-card"><div class="sv" style="color:#3498db">${avgColor.toFixed(0)} ms</div><div class="sl">看颜色任务 RT</div></div>
      <div class="stat-card"><div class="sv" style="color:#e67e22">${avgMeaning.toFixed(0)} ms</div><div class="sl">看字义任务 RT</div></div>
    `:''}
    <div class="stat-card"><div class="sv" style="color:#ff6b6b">${maxCombo}</div><div class="sl">最高连击</div></div>
  `;

  // 干扰值
  document.getElementById('hl-card').innerHTML=`
    <div class="hv">${stroopDelay>=0?'+':''}${stroopDelay.toFixed(0)} ms</div>
    <div class="hl">⚡ 认知干扰值（冲突题 − 一致题）</div>
    ${soloDiff==='hard'?`<div style="font-size:.82rem;color:var(--sub);margin-top:4px">🔄 切换代价（看字义 − 看颜色）：${switchCost>=0?'+':''}${switchCost.toFixed(0)} ms</div>`:''}
  `;

  // 动态评语
  let ci,ct,cb;
  if(stroopDelay>50&&acc>=85){ci='🧠';ct='典型的斯特鲁普效应';cb=`你的抗干扰能力较强，冲突题慢了约 <strong>${stroopDelay.toFixed(0)} ms</strong>，这是大脑处理"字义 vs 颜色"冲突的自然延迟。高正确率表明你在放慢速度后保持了良好判断力。`}
  else if(stroopDelay>50&&acc<85){ci='📚';ct='显著的斯特鲁普效应';cb=`冲突题产生了明显延迟（<strong>${stroopDelay.toFixed(0)} ms</strong>），正确率有提升空间。建议多练习专注力训练，抑制自动化阅读反应。`}
  else if(stroopDelay<=50&&acc>=85){ci='🏆';ct='卓越的抗干扰能力';cb=`几乎未受斯特鲁普效应影响！干扰值仅 <strong>${stroopDelay.toFixed(0)} ms</strong>，同时保持高正确率。你的大脑具有极高的认知控制水平。${combo>=10?' 最高 '+maxCombo+' 连击更是证明了你超强的专注力！':''}`}
  else if(stroopDelay<=50&&acc<85){ci='🎯';ct='速度优先策略';cb=`反应很快（干扰值仅 <strong>${stroopDelay.toFixed(0)} ms</strong>），但正确率偏低。倾向于快速作答而非仔细判断，建议平衡速度与准确度。`}
  else{ci='💡';ct='继续加油';cb='斯特鲁普效应是普遍认知现象。通过有意识的训练可以逐步提升处理速度。建议放松心态再测一次。'}
  document.getElementById('comment-box').innerHTML=`<span class="ci">${ci}</span><div class="ct">${ct}</div><div class="cb">${cb}</div>`;

  showScreen('screen-report');

  // 延迟渲染图表（等待 DOM 就绪）
  setTimeout(renderCharts,200);
}

// ==================== Chart.js 图表 ====================
function renderCharts(){
  const d=soloData;
  // 柱状图：分类平均 RT
  const congRT=d.filter(x=>x.congruent&&x.correct).reduce((s,x)=>s+x.rt,0);
  const incRT=d.filter(x=>!x.congruent&&x.correct).reduce((s,x)=>s+x.rt,0);
  const congN=d.filter(x=>x.congruent&&x.correct).length;
  const incN=d.filter(x=>!x.congruent&&x.correct).length;

  const labels=['一致题','冲突题'];
  const dataRT=[congN>0?congRT/congN:0,incN>0?incRT/incN:0];

  if(soloDiff==='hard'){
    const colRT=d.filter(x=>x.task==='color'&&x.correct).reduce((s,x)=>s+x.rt,0);
    const meanRT=d.filter(x=>x.task==='meaning'&&x.correct).reduce((s,x)=>s+x.rt,0);
    const colN=d.filter(x=>x.task==='color'&&x.correct).length;
    const meanN=d.filter(x=>x.task==='meaning'&&x.correct).length;
    labels.push('反向题');dataRT.push(meanN>0?meanRT/meanN:0);
  }

  const ctxBar=document.getElementById('chart-bar');
  if(ctxBar&&typeof Chart!=='undefined'){
    new Chart(ctxBar,{type:'bar',data:{labels,datasets:[{label:'平均 RT (ms)',data:dataRT,
      backgroundColor:['rgba(46,204,113,.6)','rgba(231,76,60,.6)','rgba(230,126,34,.6)'],
      borderColor:['#2ecc71','#e74c3c','#e67e22'],borderWidth:2,borderRadius:6}]},
      options:{responsive:true,maintainAspectRatio:true,
        plugins:{legend:{display:false,labels:{color:'#aaa'}}},
        scales:{y:{grid:{color:'rgba(255,255,255,.06)'},ticks:{color:'#aaa'}},
          x:{ticks:{color:'#aaa'}}}}
    });
  }

  // 折线图：RT 走势
  const ctxLine=document.getElementById('chart-line');
  if(ctxLine&&typeof Chart!=='undefined'){
    const pts=d.map((x,i)=>({x:i+1,y:x.rt.toFixed(0)}));
    new Chart(ctxLine,{type:'line',data:{labels:pts.map(p=>p.x),datasets:[{label:'RT (ms)',data:pts.map(p=>p.y),
      borderColor:'#667eea',backgroundColor:'rgba(102,126,234,.1)',fill:true,tension:.3,pointRadius:2,pointHoverRadius:5}]},
      options:{responsive:true,maintainAspectRatio:true,
        plugins:{legend:{display:false}},
        scales:{y:{grid:{color:'rgba(255,255,255,.06)'},ticks:{color:'#aaa'}},
          x:{ticks:{color:'#aaa',maxTicksLimit:10}}}}
    });
  }
}

// ==================== 保存报告 ====================
function saveReport(){
  const card=document.querySelector('#screen-report');
  if(typeof html2canvas==='undefined'){alert('html2canvas 加载中，请稍后重试');return}
  html2canvas(card,{backgroundColor:'#151530',scale:2}).then(canvas=>{
    const link=document.createElement('a');link.download='stroop-report.png';
    link.href=canvas.toDataURL('image/png');link.click();
  }).catch(()=>alert('保存失败，请重试'));
}

// ==================== 单人再挑战 ====================
function startSoloReplay(){
  gameMode='solo';gameActive=true;cooldown=false;paused=false;tIdx=0;
  soloData=[];soloIdx=0;combo=0;maxCombo=0;trials=generateTrials(soloQCount);
  document.getElementById('team-indicator').classList.add('hidden');
  document.getElementById('solo-progress').classList.remove('hidden');
  document.getElementById('task-badge').classList.toggle('hidden',soloDiff==='normal');
  document.getElementById('combo-display').classList.remove('hidden');
  document.getElementById('scoreboard').classList.add('hidden');
  document.getElementById('timer').classList.add('hidden');
  document.getElementById('combo-display').textContent='';
  document.getElementById('combo-display').className='combo-display';
  showScreen('screen-game');updateSoloP();showTrial();
}
function backToSetup(){
  clearInterval(timerH);gameActive=false;paused=false;cooldown=false;
  document.body.classList.remove('diff-hard');
  showScreen('screen-setup');
}

showScreen('screen-setup');
